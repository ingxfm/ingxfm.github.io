baseURL = 'https://ingxfm.github.io/'
languageCode = 'en-US'
title = 'Home'
copyright = "Copyright © 2026"
theme = 'hugo-PaperMod'

disableKinds = ["taxonomy"]
ignoreErrors = ["error-disable-taxonomy"]

# Default language settings
defaultContentLanguage = 'en'
defaultContentLanguageInSubdir = true

[languages]
  [languages.en]
    contentDir = 'content/en'
    disabled = false
    languageCode = 'en-US'
    languageName = 'English'
    title = 'ingxfm'
    weight = 1
    [languages.en.params]
      subtitle = 'QA engineer | QA leader | SRE/DevOps'
  [languages.es]
    contentDir = 'content/es'
    disabled = false
    languageCode = 'es-419'
    languageName = 'Español'
    title = 'ingxfm'
    weight = 2
    [languages.es.params]
      subtitle = ''

[menu]
  [[menu.main]]
  identifier = 'about'
  name = 'About'
  url = "/about/"
  weight = 1

  [[menu.main]]
  identifier = 'blog'
  name = 'Blog'
  url = "/blog/"
  weight = 2

[services]
  [services.googleAnalytics]
    ID = 'G-FLCEVDW9T3'

[params]
  # Core cleanup
  ShowReadingTime = false
  ShowShareButtons = false
  ShowPostNavLinks = false
  ShowBreadCrumbs = false
  ShowCodeCopyButtons = false
  ShowWordCount = false
  ShowToc = false
  ShowRssButtonInSectionTermList = false

  # Metadata cleanup
  ShowPostMeta = false
  ShowDate = true
  ShowAuthor = true

  # List pages
  hideMeta = true

  # Homepage behavior
  ShowFullTextinRSS = false
  ShowSummary = false
  disableSpecial1stPost = true
  mainSections = []
